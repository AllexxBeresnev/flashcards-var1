<!DOCTYPE html>
<html>
<head>
    <title>Заучивание слов</title>
    <style>
        /* стили остаются без изменений (см. предыдущий ответ) */
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; text-align: center; background-color: #f5f5f5; }
        h1 { color: #333; }
        .interval-control { margin: 20px auto; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .interval-btn { padding: 5px 15px; font-size: 20px; background-color: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .interval-btn:hover { background-color: #5a6268; }
        .interval-value { font-size: 18px; min-width: 50px; text-align: center; }
        .progress-container { width: 400px; margin: 20px auto; background-color: #e0e0e0; border-radius: 5px; overflow: hidden; }
        .progress-bar { height: 20px; background-color: #007bff; width: 0%; transition: width 0.3s; }
        .progress-text { margin-top: 5px; font-size: 14px; color: #666; }
        .flashcard-container { perspective: 1000px; margin: 40px auto; width: 400px; height: 300px; }
        .flashcard { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; background-color: white; }
        .front { background-color: #007bff; color: white; }
        .back { background-color: #28a745; color: white; transform: rotateY(180deg); }
        .word { font-size: 48px; font-weight: bold; }
        .translation { font-size: 36px; margin: 10px 0; }
        .translations-list { font-size: 24px; list-style: none; padding: 0; }
        .translations-list li { margin: 5px 0; }
        .image { max-width: 100%; max-height: 150px; margin-top: 10px; border-radius: 5px; }
        .next-btn { margin: 10px; padding: 10px 30px; font-size: 18px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .next-btn:hover { background-color: #0056b3; }
        .shuffle-btn { margin: 10px; padding: 10px 30px; font-size: 18px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .shuffle-btn:hover { background-color: #218838; }
        .message { font-size: 18px; color: #666; margin: 20px; }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Заучивание слов (группа 1)</h1>
    
    <div class="interval-control">
        <button class="interval-btn" id="decrementInterval">-</button>
        <span class="interval-value" id="intervalValue">3</span>
        <span>сек</span>
        <button class="interval-btn" id="incrementInterval">+</button>
    </div>

    <div id="progressBlock">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText"></div>
    </div>

    <div class="flashcard-container">
        <div class="flashcard" id="flashcard">
            <div class="front">
                <div class="word" id="word">Загрузка...</div>
                <img id="image" class="image" style="display: none;">
            </div>
            <div class="back">
                <div id="translationDisplay"></div>
            </div>
        </div>
    </div>
    
    <div>
        <button class="shuffle-btn" id="shuffleBtn">Перемешать заново</button>
        <button class="next-btn" id="nextBtn">Следующее слово</button>
    </div>

    
    <!-- Новая ссылка -->
    <div style="margin-top: 30px;">
        <a href="{% url 'practice' %}" style="display: inline-block; padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px;">Перейти к тренировке (практика)</a>
    </div>

    <script>
        let cardIds = [];
        let currentIndex = 0;
        let currentCard = null;
        let flipTimer = null;
        let currentInterval = 3;
        let cycleCompleted = false;  // новый флаг

        const flashcard = document.getElementById('flashcard');
        const wordEl = document.getElementById('word');
        const imageEl = document.getElementById('image');
        const translationDisplay = document.getElementById('translationDisplay');
        const intervalSpan = document.getElementById('intervalValue');
        const decrementBtn = document.getElementById('decrementInterval');
        const incrementBtn = document.getElementById('incrementInterval');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        // Загружаем сохранённый прогресс из localStorage
        function loadProgress() {
            const saved = localStorage.getItem('learnProgress');
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    return null;
                }
            }
            return null;
        }

        // Сохраняем прогресс
        function saveProgress() {
            const progress = {
                cardIds: cardIds,
                currentIndex: currentIndex,
                cycleCompleted: cycleCompleted
            };
            localStorage.setItem('learnProgress', JSON.stringify(progress));
        }

        // Сравнение массивов
        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            for (let i = 0; i < a.length; i++) {
                if (a[i] !== b[i]) return false;
            }
            return true;
        }

        // Обновление прогресс-бара
        function updateProgressBar() {
            const total = cardIds.length;
            if (total === 0) {
                progressBar.style.width = '0%';
                progressText.textContent = 'Нет карточек';
                return;
            }
            let completedCount;
            if (cycleCompleted) {
                completedCount = total; // все пройдены
            } else {
                completedCount = currentIndex; // количество уже просмотренных (не включая текущую?)
                // Примечание: currentIndex указывает на текущую показываемую карточку.
                // Если мы хотим показывать "просмотрено N из M", где N - количество уже показанных,
                // то при currentIndex = 0 (первая ещё не показана) правильно показывать 0 из M.
                // Но в нашей логике после загрузки карточки мы её считаем показанной? 
                // Обычно прогресс считают после того, как карточка была показана. 
                // Мы будем считать, что currentIndex - это индекс текущей карточки (0..total-1),
                // а количество просмотренных = currentIndex (если currentIndex = 0, ещё ни одной не показано).
                // Однако при загрузке первой карточки мы хотим показывать "Просмотрено 1 из M"? 
                // Это зависит от предпочтений. Я предлагаю считать, что когда карточка загружена, она уже считается просмотренной.
                // Тогда количество просмотренных = currentIndex + 1 (если не завершено).
                if (!cycleCompleted && currentIndex < total) {
                    completedCount = currentIndex + 1;
                } else if (!cycleCompleted && currentIndex >= total) {
                    completedCount = total; // на всякий случай
                } else {
                    completedCount = total;
                }
            }
            const percent = (completedCount / total) * 100;
            progressBar.style.width = percent + '%';
            progressText.textContent = `Просмотрено ${completedCount} из ${total}${cycleCompleted ? ' (завершено)' : ''}`;
        }

        // Загрузка следующей карточки
        function loadNextCard() {
            if (flipTimer) {
                clearTimeout(flipTimer);
                flipTimer = null;
            }
            flashcard.classList.remove('flipped');

            // Проверяем, завершён ли цикл
            if (cycleCompleted) {
                wordEl.textContent = 'Все карточки изучены!';
                translationDisplay.innerHTML = '';
                imageEl.style.display = 'none';
                updateProgressBar();
                return;
            }

            if (cardIds.length === 0) {
                wordEl.textContent = 'Нет карточек в группе 1';
                updateProgressBar();
                return;
            }

            // Если дошли до конца, устанавливаем cycleCompleted = true
            if (currentIndex >= cardIds.length) {
                cycleCompleted = true;
                saveProgress();
                loadNextCard(); // рекурсивный вызов для отображения сообщения
                return;
            }

            const cardId = cardIds[currentIndex];
            $.ajax({
                url: '{% url "next_learn_card" %}',
                method: 'GET',
                data: { card_id: cardId },
                success: function(data) {
                    if (data.error) {
                        wordEl.textContent = data.error;
                        translationDisplay.innerHTML = '';
                        imageEl.style.display = 'none';
                        return;
                    }
                    currentCard = data;
                    wordEl.textContent = data.word;
                    
                    if (data.image_url) {
                        imageEl.src = data.image_url;
                        imageEl.style.display = 'block';
                    } else {
                        imageEl.style.display = 'none';
                    }

                    let translationsHtml = '';
                    if (data.translation2 || data.translation3) {
                        translationsHtml = '<ul class="translations-list">';
                        translationsHtml += '<li>' + data.translation1 + '</li>';
                        if (data.translation2) translationsHtml += '<li>' + data.translation2 + '</li>';
                        if (data.translation3) translationsHtml += '<li>' + data.translation3 + '</li>';
                        translationsHtml += '</ul>';
                    } else {
                        translationsHtml = '<div class="translation">' + data.translation1 + '</div>';
                    }
                    translationDisplay.innerHTML = translationsHtml;

                    // Запускаем таймер переворота
                    flipTimer = setTimeout(function() {
                        flashcard.classList.add('flipped');
                    }, currentInterval * 1000);

                    updateProgressBar();
                    saveProgress();
                },
                error: function() {
                    wordEl.textContent = 'Ошибка загрузки карточки';
                }
            });
        }

        // Загрузка списка ID карточек из группы 1
        function fetchCardIds() {
            $.ajax({
                url: '{% url "get_group1_cards" %}',
                method: 'GET',
                success: function(data) {
                    if (data.error) {
                        cardIds = [];
                        wordEl.textContent = data.error;
                        updateProgressBar();
                        return;
                    }
                    cardIds = data.card_ids;
                    // Восстанавливаем прогресс
                    const saved = loadProgress();
                    if (saved && saved.cardIds && saved.currentIndex !== undefined && saved.cycleCompleted !== undefined) {
                        if (arraysEqual(saved.cardIds, cardIds)) {
                            currentIndex = saved.currentIndex;
                            cycleCompleted = saved.cycleCompleted;
                        } else {
                            // карточки изменились – начинаем заново
                            currentIndex = 0;
                            cycleCompleted = false;
                        }
                    } else {
                        currentIndex = 0;
                        cycleCompleted = false;
                    }
                    loadNextCard();
                },
                error: function() {
                    wordEl.textContent = 'Ошибка загрузки списка карточек';
                }
            });
        }

        // Обработчики интервала
        decrementBtn.addEventListener('click', function() {
            if (currentInterval > 1) {
                currentInterval--;
                intervalSpan.textContent = currentInterval;
            }
        });

        incrementBtn.addEventListener('click', function() {
            if (currentInterval < 10) {
                currentInterval++;
                intervalSpan.textContent = currentInterval;
            }
        });

        // Следующее слово
        nextBtn.addEventListener('click', function() {
            if (cycleCompleted) {
                // Если цикл завершён, следующее слово не загружаем, предлагаем перемешать
                alert('Цикл завершён. Нажмите "Перемешать заново", чтобы начать новый круг.');
                return;
            }
            if (cardIds.length === 0) return;
            // Переход к следующему индексу
            if (currentIndex < cardIds.length - 1) {
                currentIndex++;
            } else {
                // Достигнут конец
                currentIndex = cardIds.length; // специальное значение для обозначения конца
                cycleCompleted = true;
                saveProgress();
                loadNextCard(); // показать сообщение о завершении
                return;
            }
            loadNextCard();
        });

        // Перемешать заново
        shuffleBtn.addEventListener('click', function() {
            // Запрашиваем новый список
            $.ajax({
                url: '{% url "get_group1_cards" %}',
                method: 'GET',
                success: function(data) {
                    if (data.error) {
                        alert(data.error);
                        return;
                    }
                    cardIds = data.card_ids;
                    currentIndex = 0;
                    cycleCompleted = false;
                    saveProgress();
                    loadNextCard();
                },
                error: function() {
                    alert('Ошибка при перемешивании');
                }
            });
        });

        // Старт
        fetchCardIds();
    </script>
</body>
</html>
