<!DOCTYPE html>
<html>
<head>
    <title>Заучивание слов</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .interval-control, .progress-section, .action-buttons {
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .interval-btn, .shuffle-btn, .next-btn {
            padding: 5px 15px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }
        .interval-btn {
            background-color: #6c757d;
        }
        .interval-btn:hover {
            background-color: #5a6268;
        }
        .shuffle-btn {
            background-color: #ffc107;
            color: black;
        }
        .shuffle-btn:hover {
            background-color: #e0a800;
        }
        .next-btn {
            background-color: #007bff;
        }
        .next-btn:hover {
            background-color: #0056b3;
        }
        .interval-value {
            font-size: 18px;
            min-width: 50px;
            text-align: center;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background-color: #28a745;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 16px;
            color: #666;
        }
        .flashcard-container {
            perspective: 1000px;
            margin: 40px auto;
            width: 400px;
            height: 300px;
        }
        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            background-color: white;
        }
        .front {
            background-color: #007bff;
            color: white;
        }
        .back {
            background-color: #28a745;
            color: white;
            transform: rotateY(180deg);
        }
        .word {
            font-size: 48px;
            font-weight: bold;
        }
        .translation {
            font-size: 36px;
            margin: 10px 0;
        }
        .translations-list {
            font-size: 24px;
            list-style: none;
            padding: 0;
        }
        .translations-list li {
            margin: 5px 0;
        }
        .image {
            max-width: 100%;
            max-height: 150px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Заучивание слов (группа 1)</h1>
    
    <div class="interval-control">
        <button class="interval-btn" id="decrementInterval">-</button>
        <span class="interval-value" id="intervalValue">3</span>
        <span>сек</span>
        <button class="interval-btn" id="incrementInterval">+</button>
    </div>

    <div class="progress-section">
        <div style="width: 100%;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
            <div class="progress-text" id="progressText">Просмотрено 0 из 0</div>
        </div>
    </div>

    <div class="flashcard-container">
        <div class="flashcard" id="flashcard">
            <div class="front">
                <div class="word" id="word">Загрузка...</div>
                <img id="image" class="image" style="display: none;">
            </div>
            <div class="back">
                <div id="translationDisplay"></div>
            </div>
        </div>
    </div>
    
    <div class="action-buttons">
        <button class="shuffle-btn" id="shuffleBtn">Перемешать заново</button>
        <button class="next-btn" id="nextBtn">Следующее слово</button>
    </div>

    <script>
        const STORAGE_KEY = 'flashcards_learn_progress';

        let currentCard = null;
        let flipTimer = null;
        let currentInterval = 3;

        // Структура прогресса: { cardIds: [...], currentIndex: 0 }
        let progress = {
            cardIds: [],
            currentIndex: 0
        };

        const flashcard = document.getElementById('flashcard');
        const wordEl = document.getElementById('word');
        const imageEl = document.getElementById('image');
        const translationDisplay = document.getElementById('translationDisplay');
        const intervalSpan = document.getElementById('intervalValue');
        const decrementBtn = document.getElementById('decrementInterval');
        const incrementBtn = document.getElementById('incrementInterval');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        // Загружаем сохранённый прогресс из localStorage
        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.cardIds && Array.isArray(parsed.cardIds) && parsed.currentIndex !== undefined) {
                        progress = parsed;
                        return true;
                    }
                } catch (e) {
                    console.warn('Не удалось загрузить сохранённый прогресс', e);
                }
            }
            return false;
        }

        // Сохраняем прогресс в localStorage
        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        }

        // Очищаем прогресс (при перемешивании)
        function resetProgress(newCardIds) {
            progress.cardIds = newCardIds;
            progress.currentIndex = 0;
            saveProgress();
        }

        // Обновляем прогресс после показа карточки (увеличиваем индекс, если он не последний)
        // Возвращает true, если карточка была показана и индекс увеличился
        function advanceProgress() {
            if (progress.currentIndex < progress.cardIds.length - 1) {
                progress.currentIndex++;
                saveProgress();
                return true;
            }
            // Если дошли до конца, остаёмся на последней, но не увеличиваем дальше
            return false;
        }

        // Обновляем отображение прогресс-бара
        function updateProgressBar() {
            const total = progress.cardIds.length;
            const current = progress.currentIndex;
            const percent = total > 0 ? (current / total) * 100 : 0;
            progressFill.style.width = percent + '%';
            progressText.textContent = `Просмотрено ${current} из ${total}`;
        }

        // Загружаем список ID карточек с сервера и инициализируем прогресс
        function fetchCardIds() {
            $.ajax({
                url: '{% url "get_group1_cards" %}',
                method: 'GET',
                success: function(data) {
                    if (!data.card_ids || data.card_ids.length === 0) {
                        wordEl.textContent = 'В группе 1 нет карточек';
                        return;
                    }
                    const newIds = data.card_ids;
                    
                    // Если нет сохранённого прогресса или сохранённый список не совпадает по длине, используем новый
                    if (!loadProgress() || progress.cardIds.length !== newIds.length) {
                        resetProgress(newIds);
                    }
                    
                    // Проверяем, что текущий индекс не выходит за пределы
                    if (progress.currentIndex >= progress.cardIds.length) {
                        progress.currentIndex = progress.cardIds.length - 1;
                        saveProgress();
                    }
                    
                    updateProgressBar();
                    loadCardById(progress.cardIds[progress.currentIndex]);
                },
                error: function() {
                    wordEl.textContent = 'Ошибка загрузки списка карточек';
                }
            });
        }

        // Загружаем карточку по её ID
        function loadCardById(cardId) {
            if (!cardId) return;
            
            if (flipTimer) {
                clearTimeout(flipTimer);
                flipTimer = null;
            }
            flashcard.classList.remove('flipped');

            $.ajax({
                url: '{% url "next_learn_card" %}',
                method: 'GET',
                data: { card_id: cardId },
                success: function(data) {
                    if (data.error) {
                        wordEl.textContent = data.error;
                        translationDisplay.innerHTML = '';
                        imageEl.style.display = 'none';
                        return;
                    }
                    currentCard = data;
                    wordEl.textContent = data.word;
                    
                    if (data.image_url) {
                        imageEl.src = data.image_url;
                        imageEl.style.display = 'block';
                    } else {
                        imageEl.style.display = 'none';
                    }

                    let translationsHtml = '';
                    if (data.translation2 || data.translation3) {
                        translationsHtml = '<ul class="translations-list">';
                        translationsHtml += '<li>' + data.translation1 + '</li>';
                        if (data.translation2) translationsHtml += '<li>' + data.translation2 + '</li>';
                        if (data.translation3) translationsHtml += '<li>' + data.translation3 + '</li>';
                        translationsHtml += '</ul>';
                    } else {
                        translationsHtml = '<div class="translation">' + data.translation1 + '</div>';
                    }
                    translationDisplay.innerHTML = translationsHtml;

                    flipTimer = setTimeout(function() {
                        flashcard.classList.add('flipped');
                    }, currentInterval * 1000);
                },
                error: function() {
                    wordEl.textContent = 'Ошибка загрузки карточки';
                }
            });
        }

        // Переход к следующей карточке
        function goToNextCard() {
            if (progress.cardIds.length === 0) return;

            // Если не последняя карточка, увеличиваем индекс
            if (progress.currentIndex < progress.cardIds.length - 1) {
                advanceProgress();
            } else {
                // Если последняя, остаёмся на ней, но можно по желанию вернуться к началу
                // В данном случае остаёмся на последней
                // Но для удобства можно зациклить, если нужно:
                // progress.currentIndex = 0;
                // saveProgress();
            }
            
            updateProgressBar();
            loadCardById(progress.cardIds[progress.currentIndex]);
        }

        // Обработчики интервала
        decrementBtn.addEventListener('click', function() {
            if (currentInterval > 1) {
                currentInterval--;
                intervalSpan.textContent = currentInterval;
            }
        });

        incrementBtn.addEventListener('click', function() {
            if (currentInterval < 10) {
                currentInterval++;
                intervalSpan.textContent = currentInterval;
            }
        });

        // Следующая карточка
        nextBtn.addEventListener('click', function() {
            goToNextCard();
        });

        // Перемешать заново
        shuffleBtn.addEventListener('click', function() {
            $.ajax({
                url: '{% url "get_group1_cards" %}',
                method: 'GET',
                success: function(data) {
                    if (!data.card_ids || data.card_ids.length === 0) {
                        wordEl.textContent = 'В группе 1 нет карточек';
                        return;
                    }
                    resetProgress(data.card_ids);
                    updateProgressBar();
                    loadCardById(progress.cardIds[progress.currentIndex]);
                },
                error: function() {
                    wordEl.textContent = 'Ошибка перемешивания';
                }
            });
        });

        // Инициализация
        fetchCardIds();
    </script>
</body>
</html>
